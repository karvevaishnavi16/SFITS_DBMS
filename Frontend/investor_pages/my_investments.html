<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Investments - SFITS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../theme.js"></script>
  </head>
  <body>
    <div class="app-layout">
      <nav class="sidebar investor">
        <div class="sidebar-brand">
          <div class="sidebar-title">SFITS</div>
          <div class="sidebar-subtitle"><i class="ri-sparkling-2-line"></i> Workspace</div>
          <div class="sidebar-role-chip">
            <i class="ri-line-chart-line"></i>
            <span>Investor Panel</span>
          </div>
          <p class="sidebar-role-note">Track portfolio performance, browse opportunities, and invest with more clarity.</p>
        </div>
        <ul class="sidebar-nav">
          <li><a href="../investor_dashboard.html"><span class="nav-icon"><i class="ri-dashboard-line"></i></span> Dashboard</a></li>
          <li><a href="browse_startups.html"><span class="nav-icon"><i class="ri-search-line"></i></span> Browse Startups</a></li>
          <li><a href="invest.html"><span class="nav-icon"><i class="ri-coins-line"></i></span> Invest</a></li>
          <li><a href="my_investments.html" class="active"><span class="nav-icon"><i class="ri-bar-chart-box-line"></i></span> My Investments</a></li>
        </ul>
        <div class="sidebar-bottom"><a href="../welcome.html" onclick="localStorage.clear()"><i class="ri-logout-box-r-line"></i> Logout</a></div>
      </nav>

      <div class="main-content">
        <div class="page-header"><h1>My Investments</h1><p>Track all your investment activity</p></div>

        <div class="table-container animate-fade-in-up delay-1">
          <h2 class="section-title">📋 Investment Portfolio</h2>
          <table>
            <thead><tr><th>Startup</th><th>Round</th><th>Amount</th><th>Equity (%)</th></tr></thead>
            <tbody id="table"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const user_id = localStorage.getItem("user_id");
      if (!user_id) window.location.href = "../login.html";

      async function ensureInvestor() {
        let investor_id = localStorage.getItem("investor_id");
        const user_id = localStorage.getItem("user_id");
        if (!investor_id && user_id) {
          const res = await fetch(`http://localhost:5000/getInvestor/${user_id}`);
          const data = await res.json();
          if (data.investor_id) localStorage.setItem("investor_id", data.investor_id);
        }
      }

      async function loadInvestments() {
        const investor_id = localStorage.getItem("investor_id");
        if (!investor_id) { document.getElementById("table").innerHTML = `<tr><td colspan="4" style="text-align:center;padding:1.5rem;color:var(--text-muted);">No investor profile found</td></tr>`; return; }
        const res = await fetch(`http://localhost:5000/myInvestments/${investor_id}`);
        const data = await res.json();
        const table = document.getElementById("table");
        table.innerHTML = "";
        if (data.length === 0) { table.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:1.5rem;color:var(--text-muted);">No investments yet</td></tr>`; return; }
        data.forEach((i) => {
          table.innerHTML += `<tr><td>${i.startup_name}</td><td><span class="badge badge-purple">${i.round_type}</span></td><td>₹${Number(i.amount_invested).toLocaleString()}</td><td>${i.equity_acquired}%</td></tr>`;
        });
      }

      (async () => { await ensureInvestor(); loadInvestments(); })();
    </script>
  <script>
(function() {
  var name = localStorage.getItem("username") || "User";
  var role = localStorage.getItem("role") || "Member";
  var initials = name.split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();
  var brand = document.querySelector(".sidebar-brand");
  if (brand) {
    var chip = document.createElement("div");
    chip.className = "sidebar-user-chip";
    chip.innerHTML = "<div class=\"sidebar-user-avatar\">" + initials + "</div><div class=\"sidebar-user-info\"><div class=\"sidebar-user-name\">" + name + "</div><div class=\"sidebar-user-role\">" + role + "</div></div>";
    var title = brand.querySelector(".sidebar-title");
    if (title && title.nextSibling) {
      brand.insertBefore(chip, title.nextSibling);
    } else {
      brand.appendChild(chip);
    }
  }
})();
</script>
</body>
</html>
