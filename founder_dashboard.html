<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Founder Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex">
      <!-- Sidebar -->
      <div class="w-64 h-screen bg-blue-700 text-white p-5">
        <h2 class="text-2xl font-bold mb-6">Founder Panel</h2>

        <ul class="space-y-3">
          <li>
            <a href="#" class="block p-2 bg-blue-600 rounded">🏠 Dashboard</a>
          </li>
          <li>
            <a
              href="pages/startups.html"
              class="block p-2 hover:bg-blue-600 rounded"
              >🚀 My Startups</a
            >
          </li>
          <li>
            <a
              href="pages/founders.html"
              class="block p-2 hover:bg-blue-600 rounded"
              >👥 Founders</a
            >
          </li>
          <li>
            <a
              href="pages/funding.html"
              class="block p-2 hover:bg-blue-600 rounded"
              >💸 Funding</a
            >
          </li>
          <li>
            <a
              href="pages/captable.html"
              class="block p-2 hover:bg-blue-600 rounded"
              >📊 Cap Table</a
            >
          </li>
          <li>
            <a
              href="pages/history.html"
              class="block p-2 hover:bg-blue-600 rounded"
              >🕒 History</a
            >
          </li>
        </ul>
      </div>

      <!-- Main -->
      <div class="p-6 w-full">
        <h1 class="text-2xl font-bold mb-6">Welcome, Founder 👩‍💼</h1>

        <!-- TOP CARDS -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white p-5 rounded-xl shadow">
            <h2 class="text-gray-500 text-sm">Total Funding</h2>
            <p id="funding" class="text-2xl font-bold text-blue-600">-</p>

            <!-- 🔥 PROGRESS BAR -->
            <div class="w-full bg-gray-200 rounded-full h-3 mt-2">
              <div
                id="fundingBar"
                class="bg-blue-600 h-3 rounded-full"
                style="width: 0%"
              ></div>
            </div>

            <p id="fundingPercent" class="text-sm text-gray-600 mt-1">0%</p>
          </div>

          <div class="bg-white p-5 rounded-xl shadow">
            <h2 class="text-gray-500 text-sm">Investors</h2>
            <p id="investors" class="text-2xl font-bold text-green-600">-</p>
          </div>

          <div class="bg-white p-5 rounded-xl shadow">
            <h2 class="text-gray-500 text-sm">Founder Equity</h2>
            <p id="equity" class="text-2xl font-bold text-purple-600">-</p>
          </div>
        </div>

        <!-- EXTRA -->
        <div class="grid grid-cols-3 gap-4">
          <div class="bg-white p-5 rounded-xl shadow">
            <h2 class="text-gray-500 text-sm">Startup Stage</h2>
            <p id="stage" class="text-xl font-semibold">-</p>
          </div>

          <div class="bg-white p-5 rounded-xl shadow">
            <h2 class="text-gray-500 text-sm">Latest Round</h2>
            <p id="round" class="text-xl font-semibold">-</p>
          </div>

          <div class="bg-white p-5 rounded-xl shadow">
            <h2 class="text-gray-500 text-sm">Valuation</h2>
            <p id="valuation" class="text-xl font-semibold">-</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.onload = function () {
        const user_id = localStorage.getItem("user_id");
        const startup_id = localStorage.getItem("startup_id");

        // 🔒 LOGIN CHECK
        if (!user_id) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }

        // 🚨 STARTUP CHECK
        if (!startup_id) {
          alert("Select a startup first");
          window.location.href = "pages/startups.html";
          return;
        }

        loadDashboard(startup_id);
      };
      function formatCurrency(value) {
        if (!value) return "₹0";

        if (value >= 1000000) {
          return "₹" + (value / 1000000).toFixed(2) + "M";
        } else if (value >= 1000) {
          return "₹" + (value / 1000).toFixed(1) + "K";
        } else {
          return "₹" + value;
        }
      }

      async function loadDashboard(startup_id) {
        if (!startup_id) {
          startup_id = localStorage.getItem("startup_id");
        }

        try {
          const res = await fetch(
            `http://localhost:5000/startupDashboard/${startup_id}`,
          );

          if (!res.ok) {
            const errorText = await res.text();
            throw new Error(`Server error: ${res.status} ${errorText}`);
          }

          const data = await res.json();

          console.log("Dashboard:", data);

          if (!data) {
            console.error("No data returned from endpoint");
            return;
          }

          const raised = Number(data.total_funding ?? 0);
          const target = Number(data.target_funding ?? 0);

          // 💰 FUNDING
          document.getElementById("funding").innerText =
            `${formatCurrency(raised)} / ${formatCurrency(target)}`;

          // 📊 PROGRESS
          const percent = target > 0 ? (raised / target) * 100 : 0;

          document.getElementById("fundingPercent").innerText =
            percent.toFixed(1) + "% funded";

          document.getElementById("fundingBar").style.width =
            Math.min(percent, 100) + "%";

          // 👥 INVESTORS
          document.getElementById("investors").innerText =
            data.total_investors ?? 0;

          // 👩‍💻 FOUNDER EQUITY
          document.getElementById("equity").innerText =
            data.founder_equity != null
              ? Number(data.founder_equity).toFixed(2) + "%"
              : "-";

          // 🚀 STAGE
          document.getElementById("stage").innerText =
            data.stage != null ? data.stage : "-";

          // 🧾 ROUND
          document.getElementById("round").innerText =
            data.latest_round != null ? data.latest_round : "-";

          // 💎 VALUATION
          document.getElementById("valuation").innerText =
            data.valuation != null && data.valuation > 0
              ? formatCurrency(data.valuation)
              : "-";
        } catch (err) {
          console.error("Error loading dashboard:", err);
          alert("Failed to load startup dashboard: " + err.message);
        }
      }
    </script>
  </body>
</html>
