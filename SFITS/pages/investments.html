<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Investments - SFITS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 p-6">
    <h1 class="text-2xl font-bold mb-6">Investments</h1>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <h2 class="text-lg font-semibold mb-4">Add Investment</h2>

      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select class="border p-2 rounded">
          <option>Select Startup</option>
          <option>PayEase</option>
        </select>

        <select class="border p-2 rounded">
          <option>Select Funding Round</option>
          <option>Seed</option>
        </select>

        <select class="border p-2 rounded">
          <option>Select Investor</option>
          <option>BlueChip Ventures</option>
        </select>

        <input
          type="number"
          placeholder="Amount Invested"
          class="border p-2 rounded"
        />

        <input
          type="number"
          placeholder="Equity Received (%)"
          class="border p-2 rounded"
        />

        <button
          class="bg-blue-600 text-white p-2 rounded col-span-2 hover:bg-blue-700"
        >
          Add Investment
        </button>
      </form>
    </div>

    <!-- TABLE -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-lg font-semibold mb-4">Investment Records</h2>

      <table class="w-full border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border">Startup</th>
            <th class="p-2 border">Round</th>
            <th class="p-2 border">Investor</th>
            <th class="p-2 border">Amount</th>
            <th class="p-2 border">Equity (%)</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td class="p-2 border">PayEase</td>
            <td class="p-2 border">Seed</td>
            <td class="p-2 border">BlueChip Ventures</td>
            <td class="p-2 border">300,000</td>
            <td class="p-2 border">15%</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
