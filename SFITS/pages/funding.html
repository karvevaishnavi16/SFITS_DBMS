<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Funding Rounds - SFITS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 p-6">
    <h1 class="text-2xl font-bold mb-6">Funding Rounds</h1>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <h2 class="text-lg font-semibold mb-4">Add Funding Round</h2>

      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select class="border p-2 rounded">
          <option>Select Startup</option>
          <option>PayEase</option>
          <option>MediScan</option>
        </select>

        <input
          type="text"
          placeholder="Round Type (Seed/Series A)"
          class="border p-2 rounded"
        />

        <input type="date" class="border p-2 rounded" />

        <input
          type="number"
          placeholder="Valuation"
          class="border p-2 rounded"
        />

        <input
          type="number"
          placeholder="Total Amount Raised"
          class="border p-2 rounded"
        />

        <button
          class="bg-blue-600 text-white p-2 rounded col-span-2 hover:bg-blue-700"
        >
          Add Round
        </button>
      </form>
    </div>

    <!-- TABLE -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-lg font-semibold mb-4">Funding Rounds List</h2>

      <table class="w-full border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border">Startup</th>
            <th class="p-2 border">Round</th>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Valuation</th>
            <th class="p-2 border">Amount Raised</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td class="p-2 border">PayEase</td>
            <td class="p-2 border">Seed</td>
            <td class="p-2 border">2019-06-01</td>
            <td class="p-2 border">1,000,000</td>
            <td class="p-2 border">500,000</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
