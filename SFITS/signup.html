<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - SFITS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-r from-blue-500 to-blue-700 min-h-screen flex items-center justify-center"
  >
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
      <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
        Create Account
      </h2>

      <form id="signupForm">
        <input
          type="text"
          placeholder="Full Name"
          class="w-full p-2 border rounded mb-3"
          required
        />
        <input
          type="email"
          placeholder="Email"
          class="w-full p-2 border rounded mb-3"
          required
        />
        <select id="role" class="w-full p-2 border rounded mb-3" required>
          <option value="">Select Role</option>
          <option value="founder">Founder</option>
          <option value="investor">Investor</option>
        </select>
        <input
          type="password"
          placeholder="Password"
          class="w-full p-2 border rounded mb-4"
          required
        />

        <button
          class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700"
        >
          Sign Up
        </button>
      </form>

      <p class="text-sm text-center mt-4">
        Already have an account?
        <a href="login.html" class="text-blue-600">Login</a>
      </p>
    </div>
    <script>
      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const role = document.getElementById("role").value;

          alert("Signup successful as " + role + "!");

          // Store role temporarily (localStorage)
          localStorage.setItem("userRole", role);

          // Redirect based on role
          if (role === "founder") {
            window.location.href = "founder_dashboard.html";
          } else {
            window.location.href = "investor_dashboard.html";
          }
        });
    </script>
  </body>
</html>
