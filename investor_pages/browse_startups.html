<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Browse Startups</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex">
    <!-- SIDEBAR -->

    <div class="w-64 h-screen bg-green-700 text-white p-5">
      <h2 class="text-2xl font-bold mb-6">Investor Panel</h2>

      <ul class="space-y-3">
        <li>
          <a
            href="../investor_dashboard.html"
            class="block p-2 hover:bg-green-600 rounded"
          >
            🏠 Dashboard
          </a>
        </li>
        <li>
          <a href="browse_startups.html" class="block p-2 bg-green-600 rounded">
            🔍 Browse Startups
          </a>
        </li>
        <li>
          <a href="invest.html" class="block p-2 hover:bg-green-600 rounded">
            💰 Invest
          </a>
        </li>
        <li>
          <a
            href="my_investments.html"
            class="block p-2 hover:bg-green-600 rounded"
          >
            📈 My Investments
          </a>
        </li>
      </ul>
    </div>

    <!-- MAIN CONTENT -->

    <div class="p-6 w-full">
      <h1 class="text-2xl font-bold mb-6">Browse Startups</h1>

      <div id="startupList" class="grid grid-cols-3 gap-6"></div>
    </div>

    <script>
      const user_id = localStorage.getItem("user_id");

      if (!user_id) {
        window.location.href = "../login.html";
      }

      async function ensureInvestor() {
        let investor_id = localStorage.getItem("investor_id");
        const user_id = localStorage.getItem("user_id");

        if (!investor_id && user_id) {
          const res = await fetch(
            `http://localhost:5000/getInvestor/${user_id}`,
          );
          const data = await res.json();

          if (data.investor_id) {
            localStorage.setItem("investor_id", data.investor_id);
          }
        }
      }

      async function loadStartups() {
        try {
          const res = await fetch("http://localhost:5000/allStartups");
          const data = await res.json();

          const container = document.getElementById("startupList");
          container.innerHTML = "";

          data.forEach((s) => {
            container.innerHTML += `
          <div class="bg-white p-5 rounded-xl shadow hover:shadow-lg transition">
            <h2 class="text-lg font-bold">${s.startup_name}</h2>
            <p class="text-sm text-gray-600">${s.city}, ${s.country}</p>
            <p class="text-sm text-blue-600 mt-2">${s.stage}</p>
          </div>
        `;
          });
        } catch (err) {
          console.error("Error loading startups:", err);
        }
      }

      // ✅ IMPORTANT: CALL THIS FIRST
      (async () => {
        await ensureInvestor();
        loadStartups();
      })();
    </script>
  </body>
</html>
