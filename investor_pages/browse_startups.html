<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Startups - SFITS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../theme.js"></script>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="app-layout">
      <nav class="sidebar investor">
        <div class="sidebar-brand">
          <div class="sidebar-title">SFITS</div>
          <div class="sidebar-subtitle"><i class="ri-sparkling-2-line"></i> Workspace</div>
          <div class="sidebar-role-chip">
            <i class="ri-line-chart-line"></i>
            <span>Investor Panel</span>
          </div>
          <p class="sidebar-role-note">Track portfolio performance, browse opportunities, and invest with more clarity.</p>
        </div>
        <ul class="sidebar-nav">
          <li><a href="../investor_dashboard.html"><span class="nav-icon"><i class="ri-dashboard-line"></i></span> Dashboard</a></li>
          <li><a href="browse_startups.html" class="active"><span class="nav-icon"><i class="ri-search-line"></i></span> Browse Startups</a></li>
          <li><a href="invest.html"><span class="nav-icon"><i class="ri-coins-line"></i></span> Invest</a></li>
          <li><a href="my_investments.html"><span class="nav-icon"><i class="ri-bar-chart-box-line"></i></span> My Investments</a></li>
        </ul>
        <div class="sidebar-bottom"><a href="../welcome.html" onclick="localStorage.clear()"><i class="ri-logout-box-r-line"></i> Logout</a></div>
      </nav>

      <div class="main-content">
        <div class="flex justify-between items-center mb-6 animate-fade-in-down">
          <div>
            <div class="role-badge investor mb-2"><i class="ri-line-chart-line"></i> Investor Panel</div>
            <h1 class="text-2xl font-extrabold tracking-tight" style="color:var(--text-primary);">Browse Startups</h1>
            <p class="text-sm mt-1" style="color:var(--text-muted);">Discover startups looking for funding</p>
          </div>
          <div class="px-4 py-2 rounded-xl text-xs font-semibold" style="background:rgba(16,185,129,0.08);color:var(--accent-green);border:1px solid rgba(16,185,129,0.15);">
            <span id="countDisplay">0</span> Startups Available
          </div>
        </div>

        <div id="startupList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      </div>
    </div>

    <script>
      const user_id = localStorage.getItem("user_id");
      if (!user_id) window.location.href = "../login.html";

      async function ensureInvestor() {
        let investor_id = localStorage.getItem("investor_id");
        const user_id = localStorage.getItem("user_id");
        if (!investor_id && user_id) {
          const res = await fetch(`http://localhost:5000/getInvestor/${user_id}`);
          const data = await res.json();
          if (data.investor_id) localStorage.setItem("investor_id", data.investor_id);
        }
      }

      const stageColors = { 'Pre-Seed': 'badge-orange', 'Seed': 'badge-green', 'Series A': 'badge-blue', 'Series B': 'badge-purple', 'Series C': 'badge-teal' };

      async function loadStartups() {
        try {
          const res = await fetch("http://localhost:5000/allStartups");
          const data = await res.json();
          const container = document.getElementById("startupList");
          container.innerHTML = "";
          document.getElementById("countDisplay").textContent = data.length;
          if (data.length === 0) { container.innerHTML = `<p class="col-span-3 text-center py-12" style="color:var(--text-muted);">No startups available yet</p>`; return; }
          data.forEach((s, i) => {
            const badgeClass = stageColors[s.stage] || 'badge-blue';
            container.innerHTML += `
              <div class="relative overflow-hidden rounded-2xl p-5 transition-all hover:-translate-y-1 hover:shadow-lg animate-fade-in-up" style="background:var(--bg-card);border:1px solid var(--border-glass);box-shadow:var(--shadow-sm);animation-delay:${0.1 * i}s;opacity:0;">
                <div class="absolute top-0 left-0 w-full h-1" style="background:var(--gradient-fresh);"></div>
                <div class="flex items-start justify-between mb-3">
                  <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg text-indigo-600" style="background:rgba(99,102,241,0.1);"><i class="ri-building-4-line"></i></div>
                </div>
                <h2 class="text-lg font-bold mb-1" style="color:var(--text-primary);">${s.startup_name}</h2>
                <p class="text-sm mb-3" style="color:var(--text-muted);"><i class="ri-map-pin-line"></i> ${s.city || 'N/A'}, ${s.country || 'N/A'}</p>
                <div class="flex items-center justify-between">
                  <span class="badge ${badgeClass}">${s.stage}</span>
                  <span class="text-xs font-semibold" style="color:var(--text-muted);">Founded ${s.founded_year || 'N/A'}</span>
                </div>
                <div class="mt-4">
                  <a href="invest.html" class="btn btn-gradient btn-sm" style="text-decoration:none;" onclick="selectStartupForInvestment('${s.startup_id}', '${String(s.startup_name).replace(/'/g, "\\'")}')">Invest in This Startup</a>
                </div>
              </div>`;
          });
        } catch (err) { console.error("Error:", err); }
      }

      function selectStartupForInvestment(startupId, startupName) {
        localStorage.setItem("selected_invest_startup_id", startupId);
        localStorage.setItem("selected_invest_startup_name", startupName);
      }

      (async () => { await ensureInvestor(); loadStartups(); })();
    </script>
  </body>
</html>
