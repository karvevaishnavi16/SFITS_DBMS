<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Investments</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex">
    <!-- SIDEBAR -->

    <div class="w-64 h-screen bg-green-700 text-white p-5">
      <h2 class="text-2xl font-bold mb-6">Investor Panel</h2>

      <ul class="space-y-3">
        <li><a href="../investor_dashboard.html">🏠 Dashboard</a></li>
        <li><a href="browse_startups.html">🔍 Browse Startups</a></li>
        <li><a href="invest.html">💰 Invest</a></li>
        <li>
          <a href="my_investments.html" class="bg-green-600 p-2 rounded block"
            >📈 My Investments</a
          >
        </li>
      </ul>
    </div>

    <!-- MAIN -->

    <div class="p-6 w-full">
      <h1 class="text-2xl font-bold mb-6">My Investments</h1>

      <div class="bg-white p-6 rounded-xl shadow">
        <table class="w-full border">
          <thead class="bg-gray-200">
            <tr>
              <th class="p-2 border">Startup</th>
              <th class="p-2 border">Round</th>
              <th class="p-2 border">Amount</th>
              <th class="p-2 border">Equity (%)</th>
            </tr>
          </thead>

          <tbody id="table"></tbody>
        </table>
      </div>
    </div>

    <script>
      const user_id = localStorage.getItem("user_id");

      if (!user_id) {
        window.location.href = "../login.html";
      }
      const investor_id = localStorage.getItem("investor_id");
      async function ensureInvestor() {
        let investor_id = localStorage.getItem("investor_id");
        const user_id = localStorage.getItem("user_id");

        if (!investor_id && user_id) {
          const res = await fetch(
            `http://localhost:5000/getInvestor/${user_id}`,
          );
          const data = await res.json();

          if (data.investor_id) {
            localStorage.setItem("investor_id", data.investor_id);
          }
        }
      }
      async function loadInvestments() {
        const res = await fetch(
          `http://localhost:5000/myInvestments/${investor_id}`,
        );

        const data = await res.json();
        const table = document.getElementById("table");

        table.innerHTML = "";

        if (data.length === 0) {
          table.innerHTML = `
      <tr>
        <td colspan="4" class="text-center p-4 text-gray-500">
          No investments yet
        </td>
      </tr>
    `;
          return;
        }

        data.forEach((i) => {
          table.innerHTML += `
      <tr>
        <td class="border p-2">${i.startup_name}</td>
        <td class="border p-2">${i.round_type}</td>
        <td class="border p-2">₹${i.amount_invested}</td>
        <td class="border p-2">${i.equity_acquired}%</td>
      </tr>
    `;
        });
      }

      loadInvestments();
    </script>
  </body>
</html>
