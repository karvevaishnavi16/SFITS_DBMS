<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invest - SFITS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../theme.js"></script>
  </head>
  <body>
    <div class="app-layout">
      <nav class="sidebar investor">
        <div class="sidebar-brand">
          <div class="sidebar-title">SFITS</div>
          <div class="sidebar-subtitle"><i class="ri-sparkling-2-line"></i> Workspace</div>
          <div class="sidebar-role-chip">
            <i class="ri-line-chart-line"></i>
            <span>Investor Panel</span>
          </div>
          <p class="sidebar-role-note">Track portfolio performance, browse opportunities, and invest with more clarity.</p>
        </div>
        <ul class="sidebar-nav">
          <li><a href="../investor_dashboard.html"><span class="nav-icon"><i class="ri-dashboard-line"></i></span> Dashboard</a></li>
          <li><a href="browse_startups.html"><span class="nav-icon"><i class="ri-search-line"></i></span> Browse Startups</a></li>
          <li><a href="invest.html" class="active"><span class="nav-icon"><i class="ri-coins-line"></i></span> Invest</a></li>
          <li><a href="my_investments.html"><span class="nav-icon"><i class="ri-bar-chart-box-line"></i></span> My Investments</a></li>
        </ul>
        <div class="sidebar-bottom"><a href="../welcome.html" onclick="localStorage.clear()"><i class="ri-logout-box-r-line"></i> Logout</a></div>
      </nav>

      <div class="main-content">
        <div class="page-header"><h1>Invest in Startups</h1><p>Choose a funding round and invest</p></div>

        <div class="form-section animate-fade-in-up delay-1" style="max-width:600px;">
          <h2 class="section-title"><i class="ri-focus-3-line"></i> Make an Investment</h2>
          <form id="investForm" class="form-grid cols-1">
            <div><label for="round">Funding Round</label><select id="round" required></select></div>
            <div><label for="firm_name">Firm Name</label><input id="firm_name" type="text" placeholder="Firm Name (e.g. Self / VC Firm)" required /></div>
            <div><label for="country">Country</label><input id="country" type="text" placeholder="Country" required /></div>
            <div><label for="amount">Investment Amount</label><input id="amount" type="number" placeholder="Investment Amount" required /></div>
            <div><label for="equity">Equity %</label><input id="equity" type="number" placeholder="Equity %" required /></div>
            <button class="btn btn-gradient btn-full">Invest Now →</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const user_id = localStorage.getItem("user_id");
      const username = localStorage.getItem("username");
      if (!user_id) window.location.href = "../login.html";

      async function ensureInvestor() {
        let investor_id = localStorage.getItem("investor_id");
        const user_id = localStorage.getItem("user_id");
        if (!investor_id && user_id) {
          const res = await fetch(`http://localhost:5000/getInvestor/${user_id}`);
          const data = await res.json();
          if (data.investor_id) localStorage.setItem("investor_id", data.investor_id);
        }
      }

      async function loadRounds() {
        const res = await fetch("http://localhost:5000/allRounds");
        const data = await res.json();
        const dropdown = document.getElementById("round");
        dropdown.innerHTML = `<option value="" disabled selected>Select Round</option>`;
        data.forEach((r) => { dropdown.innerHTML += `<option value="${r.round_id}">${r.startup_name} - ${r.round_type}</option>`; });
      }

      let isSubmitting = false;
      document.getElementById("investForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (isSubmitting) return;
        isSubmitting = true;
        const round_id = document.getElementById("round").value;
        if (!round_id) { alert("Please select a round"); isSubmitting = false; return; }
        const amount = document.getElementById("amount").value;
        const equity = document.getElementById("equity").value;
        const firm_name = document.getElementById("firm_name").value;
        const country = document.getElementById("country").value;
        try {
          const res = await fetch("http://localhost:5000/addInvestment", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ round_id, user_id, username, firm_name, country, amount, equity }),
          });
          alert(await res.text());
          window.location.reload();
        } catch (err) { console.error(err); } finally { isSubmitting = false; }
      });

      (async () => { await ensureInvestor(); loadRounds(); })();
    </script>
  </body>
</html>
