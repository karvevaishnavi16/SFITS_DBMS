<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Funding Rounds - SFITS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

  <!-- SIDEBAR -->
  <div class="w-64 h-screen bg-blue-700 text-white p-5">
    <h2 class="text-2xl font-bold mb-6">Founder Panel</h2>

    <ul class="space-y-3">
      <li><a href="../founder_dashboard.html" class="block p-2 hover:bg-blue-600 rounded">🏠 Dashboard</a></li>
      <li><a href="startups.html" class="block p-2 hover:bg-blue-600 rounded">🚀 My Startups</a></li>
      <li><a href="founders.html" class="block p-2 hover:bg-blue-600 rounded">👥 Founders</a></li>
      <li><a href="funding.html" class="block p-2 bg-blue-600 rounded">💸 Funding</a></li>
      <li><a href="captable.html" class="block p-2 hover:bg-blue-600 rounded">📊 Cap Table</a></li>
      <li><a href="history.html" class="block p-2 hover:bg-blue-600 rounded">🕒 History</a></li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="p-6 w-full">

    <h1 class="text-2xl font-bold mb-6">Funding Rounds</h1>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <h2 class="text-lg font-semibold mb-4">Add Funding Round</h2>

      <form id="fundingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select id="startup_id" class="border p-2 rounded" required>
          <option value="">Select Startup</option>
        </select>

        <select id="round_type" class="border p-2 rounded" required>
          <option value="">Select Round</option>
          <option value="Pre-Seed">Pre-Seed</option>
          <option value="Seed">Seed</option>
          <option value="Series A">Series A</option>
          <option value="Series B">Series B</option>
          <option value="Series C">Series C</option>
        </select>

        <input id="date" type="date" class="border p-2 rounded" required />

        <input id="valuation" type="number" placeholder="Valuation" class="border p-2 rounded" required />

        <input id="amount" type="number" placeholder="Total Amount Raised" class="border p-2 rounded" required />

        <button class="bg-blue-600 text-white p-2 rounded col-span-2 hover:bg-blue-700">
          Add Round
        </button>
      </form>
    </div>

    <!-- TABLE -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-lg font-semibold mb-4">Funding Rounds List</h2>

      <table class="w-full border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border">Startup</th>
            <th class="p-2 border">Round</th>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Valuation</th>
            <th class="p-2 border">Amount Raised</th>
          </tr>
        </thead>

        <tbody id="fundingTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
window.onload = async function () {
  const user_id = localStorage.getItem("user_id");

  if (!user_id) {
    alert("Please login first");
    window.location.href = "../login.html";
    return;
  }

  await loadStartups();
  await loadFunding();

  document.getElementById("fundingForm").addEventListener("submit", addFunding);
};

// LOAD STARTUPS
async function loadStartups() {
  const user_id = localStorage.getItem("user_id");

  const res = await fetch(`http://localhost:5000/startups/${user_id}`);
  const data = await res.json();

  const dropdown = document.getElementById("startup_id");
  dropdown.innerHTML = `<option value="">Select Startup</option>`;

  data.forEach((s) => {
    dropdown.innerHTML += `
      <option value="${s.startup_id}">
        ${s.startup_name}
      </option>`;
  });
}

// ADD FUNDING
async function addFunding(e) {
  e.preventDefault();

  const startup_id = document.getElementById("startup_id").value;
  const round_type = document.getElementById("round_type").value;
  const round_date = document.getElementById("date").value;
  const valuation = document.getElementById("valuation").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch("http://localhost:5000/addFunding", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      startup_id,
      round_type,
      round_date,
      valuation,
      amount,
    }),
  });

  if (res.ok) {
    alert("Funding added ✅");
    document.getElementById("fundingForm").reset();
    loadFunding();
  } else {
    alert("Error adding funding ❌");
  }
}

// LOAD FUNDING
async function loadFunding() {
  const user_id = localStorage.getItem("user_id");

  const res = await fetch(`http://localhost:5000/funding/${user_id}`);
  const data = await res.json();

  const table = document.getElementById("fundingTable");
  table.innerHTML = "";

  if (data.length === 0) {
    table.innerHTML = `
      <tr>
        <td colspan="5" class="text-center p-4">
          No funding data available
        </td>
      </tr>`;
    return;
  }

  data.forEach((f) => {
    table.innerHTML += `
      <tr>
        <td class="p-2 border">${f.startup_name}</td>
        <td class="p-2 border">${f.round_type}</td>
        <td class="p-2 border">${f.round_date}</td>
        <td class="p-2 border">${f.valuation}</td>
        <td class="p-2 border">${f.total_amount_raised}</td>
      </tr>`;
  });
}
</script>

</body>
</html>
