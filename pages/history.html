<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Equity History - SFITS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

  <!-- SIDEBAR -->
  <div class="w-64 h-screen bg-blue-700 text-white p-5">
    <h2 class="text-2xl font-bold mb-6">Founder Panel</h2>

    <ul class="space-y-3">
      <li><a href="../founder_dashboard.html" class="block p-2 hover:bg-blue-600 rounded">🏠 Dashboard</a></li>
      <li><a href="startups.html" class="block p-2 hover:bg-blue-600 rounded">🚀 My Startups</a></li>
      <li><a href="founders.html" class="block p-2 hover:bg-blue-600 rounded">👥 Founders</a></li>
      <li><a href="funding.html" class="block p-2 hover:bg-blue-600 rounded">💸 Funding</a></li>
      <li><a href="captable.html" class="block p-2 hover:bg-blue-600 rounded">📊 Cap Table</a></li>
      <li><a href="history.html" class="block p-2 bg-blue-600 rounded">🕒 History</a></li>
      <li><a href="investments.html" class="block p-2 hover:bg-blue-600 rounded">💼 Investments</a></li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="p-6 w-full">

    <h1 class="text-2xl font-bold mb-6">Equity History</h1>

    <!-- DROPDOWN -->
    <select id="startup_id" class="border p-2 mb-4 rounded"></select>

    <!-- TABLE -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <table class="w-full border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border">Round</th>
            <th class="p-2 border">Stakeholder</th>
            <th class="p-2 border">Type</th>
            <th class="p-2 border">Equity (%)</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>

    <!-- CHART -->
    <div class="bg-white p-6 rounded-xl shadow">
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<script>
let chart;

window.onload = async function () {
  const user_id = localStorage.getItem("user_id");

  if (!user_id) {
    alert("Please login first");
    window.location.href = "../login.html";
    return;
  }

  await loadStartups();

  document
    .getElementById("startup_id")
    .addEventListener("change", loadHistory);
};

// LOAD STARTUPS
async function loadStartups() {
  const user_id = localStorage.getItem("user_id");

  const res = await fetch(`http://localhost:5000/startups/${user_id}`);
  const data = await res.json();

  const dropdown = document.getElementById("startup_id");
  dropdown.innerHTML = `<option value="">Select Startup</option>`;

  data.forEach((s) => {
    dropdown.innerHTML += `
      <option value="${s.startup_id}">
        ${s.startup_name}
      </option>`;
  });
}

// LOAD HISTORY
async function loadHistory() {
  const startup_id = document.getElementById("startup_id").value;
  if (!startup_id) return;

  const res = await fetch(`http://localhost:5000/history/${startup_id}`);
  const data = await res.json();

  const table = document.getElementById("historyTable");
  table.innerHTML = "";

  if (data.length === 0) {
    table.innerHTML = `
      <tr>
        <td colspan="4" class="text-center p-4">
          No equity history available
        </td>
      </tr>`;
    return;
  }

  const rounds = {};

  data.forEach((d) => {
    table.innerHTML += `
      <tr>
        <td class="border p-2">${d.round_type}</td>
        <td class="border p-2">${d.stakeholder}</td>
        <td class="border p-2">${d.type}</td>
        <td class="border p-2">${d.equity}%</td>
      </tr>
    `;

    if (!rounds[d.round_type]) {
      rounds[d.round_type] = { founder: 0, investor: 0 };
    }

    if (d.type === "Founder") {
      rounds[d.round_type].founder += Number(d.equity);
    } else {
      rounds[d.round_type].investor += Number(d.equity);
    }
  });

  const labels = Object.keys(rounds);
  const founderData = labels.map((r) => rounds[r].founder);
  const investorData = labels.map((r) => rounds[r].investor);

  drawChart(labels, founderData, investorData);
}

// CHART
function drawChart(labels, founderData, investorData) {
  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Founder Equity",
          data: founderData,
          borderWidth: 2,
        },
        {
          label: "Investor Equity",
          data: investorData,
          borderWidth: 2,
        },
      ],
    },
  });
}
</script>

</body>
</html>
