<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Investors - SFITS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 p-6">
    <h1 class="text-2xl font-bold mb-6">Investor Management</h1>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <h2 class="text-lg font-semibold mb-4">Add Investor</h2>

      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input
          type="text"
          placeholder="Investor Name"
          class="border p-2 rounded"
          required
        />
        <input type="text" placeholder="Firm Name" class="border p-2 rounded" />

        <select class="border p-2 rounded">
          <option>Investor Type</option>
          <option>Angel</option>
          <option>VC</option>
          <option>Corporate</option>
        </select>

        <input type="text" placeholder="Country" class="border p-2 rounded" />

        <input
          type="text"
          placeholder="Focus Industries (optional)"
          class="border p-2 rounded col-span-2"
        />

        <button
          class="bg-blue-600 text-white p-2 rounded col-span-2 hover:bg-blue-700"
        >
          Add Investor
        </button>
      </form>
    </div>

    <!-- TABLE -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-lg font-semibold mb-4">Investor List</h2>

      <table class="w-full border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border">Name</th>
            <th class="p-2 border">Firm</th>
            <th class="p-2 border">Type</th>
            <th class="p-2 border">Country</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td class="p-2 border">Vikram Patel</td>
            <td class="p-2 border">BlueChip Ventures</td>
            <td class="p-2 border">VC</td>
            <td class="p-2 border">India</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
