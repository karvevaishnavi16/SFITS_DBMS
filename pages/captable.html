<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cap Table - SFITS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex">
      <!-- SIDEBAR -->
      <div class="w-64 h-screen bg-blue-700 text-white p-5">
        <h2 class="text-2xl font-bold mb-6">Founder Panel</h2>

        <ul class="space-y-3">
          <li>
            <a
              href="../founder_dashboard.html"
              class="block p-2 hover:bg-blue-600 rounded"
              >🏠 Dashboard</a
            >
          </li>
          <li>
            <a href="startups.html" class="block p-2 hover:bg-blue-600 rounded"
              >🚀 My Startups</a
            >
          </li>
          <li>
            <a href="founders.html" class="block p-2 hover:bg-blue-600 rounded"
              >👥 Founders</a
            >
          </li>
          <li>
            <a href="funding.html" class="block p-2 hover:bg-blue-600 rounded"
              >💸 Funding</a
            >
          </li>
          <li>
            <a href="captable.html" class="block p-2 bg-blue-600 rounded"
              >📊 Cap Table</a
            >
          </li>
          <li>
            <a href="history.html" class="block p-2 hover:bg-blue-600 rounded"
              >🕒 History</a
            >
          </li>
        </ul>
      </div>

      <!-- MAIN CONTENT -->
      <div class="p-6 w-full">
        <h1 class="text-2xl font-bold mb-6">Cap Table</h1>

        <!-- SELECT STARTUP -->
        <div class="mb-4">
          <select id="startupSelect" class="border p-2 rounded"></select>
        </div>

        <!-- TABLE -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
          <h2 class="text-lg font-semibold mb-4">Ownership Distribution</h2>

          <table class="w-full border">
            <thead class="bg-gray-200">
              <tr>
                <th class="p-2 border">Stakeholder</th>
                <th class="p-2 border">Type</th>
                <th class="p-2 border">Equity (%)</th>
              </tr>
            </thead>

            <tbody id="capTableBody"></tbody>
          </table>
        </div>

        <!-- PIE CHART -->
        <div class="bg-white p-6 rounded-xl shadow">
          <h2 class="text-lg font-semibold mb-4">Equity Visualization</h2>
          <canvas id="capChart"></canvas>
        </div>
      </div>
    </div>

    <script>
      let chart;

      window.onload = async function () {
        const user_id = localStorage.getItem("user_id");

        if (!user_id) {
          alert("Please login first");
          window.location.href = "../login.html";
          return;
        }

        await loadStartups();

        // ✅ MOVE HERE
        document
          .getElementById("startupSelect")
          .addEventListener("change", (e) => {
            const selectedId = e.target.value;

            localStorage.setItem("startup_id", selectedId);

            loadCapTable(selectedId);
          });
      };

      // LOAD STARTUPS
      async function loadStartups() {
        const user_id = localStorage.getItem("user_id");

        const res = await fetch(`http://localhost:5000/startups/${user_id}`);
        const data = await res.json();

        const dropdown = document.getElementById("startupSelect");
        dropdown.innerHTML = `<option value="">Select Startup</option>`;

        data.forEach((s) => {
          dropdown.innerHTML += `
      <option value="${s.startup_id}">
        ${s.startup_name}
      </option>`;
        });

        // ✅ AFTER loop (IMPORTANT)
        if (data.length > 0) {
          const firstId = data[0].startup_id;

          dropdown.value = firstId;

          // 🔥 STORE globally
          localStorage.setItem("startup_id", firstId);

          // 🔥 LOAD DATA
          loadCapTable(firstId);
        }
      }
      // LOAD CAP TABLE
      async function loadCapTable(startup_id) {
        const res = await fetch(`http://localhost:5000/capTable/${startup_id}`);
        const data = await res.json();

        const table = document.getElementById("capTableBody");
        table.innerHTML = "";

        if (data.length === 0) {
          table.innerHTML = `
            <tr>
              <td colspan="3" class="text-center p-4">
                No cap table data available
              </td>
            </tr>`;
          return;
        }

        // 🔥 STEP 1: latest snapshot is selected by round_id on the server
        // 🔥 find latest snapshot using round_id
        // ✅ server returns the latest round snapshot
        // ✅ skip client timestamp sorting
        const unique = {};

        data.forEach((row) => {
          if (!unique[row.stakeholder]) {
            unique[row.stakeholder] = {
              ...row,
              equity_percentage: Number(row.equity_percentage) || 0,
            };
          } else {
            unique[row.stakeholder].equity_percentage +=
              Number(row.equity_percentage) || 0;
          }
        });

        const latestData = Object.values(unique);

        console.log(
          "Total:",
          latestData.reduce(
            (sum, row) => sum + Number(row.equity_percentage),
            0,
          ),
        );

        // 🔥 DEBUG
        console.log("LATEST DATA:", latestData);
        // filter valid timestamps first

        // 🔥 TOTAL
        const total = latestData.reduce(
          (sum, row) => sum + Number(row.equity_percentage),
          0,
        );
        console.log("Total Equity:", total);
        // 🔥 STEP 3: display
        latestData.forEach((row) => {
          table.innerHTML += `
            <tr>
              <td class="p-2 border">${row.stakeholder}</td>
              <td class="p-2 border ${
                row.stakeholder_type === "Founder"
                  ? "text-blue-600"
                  : "text-green-600"
              }">
                ${row.stakeholder_type}
              </td>
              <td class="p-2 border">${Number(row.equity_percentage).toFixed(2)}%</td>
            </tr>`;
        });

        drawChart(latestData);
      }

      // DRAW CHART
      function drawChart(data) {
        const ctx = document.getElementById("capChart");

        if (chart) chart.destroy();

        const labels = data.map((row) => row.stakeholder);
        const values = data.map((row) => Number(row.equity_percentage));

        chart = new Chart(ctx, {
          type: "pie",
          data: {
            labels: labels,
            datasets: [
              {
                data: values,
                backgroundColor: [
                  "#3b82f6",
                  "#ef4444",
                  "#22c55e",
                  "#f59e0b",
                  "#8b5cf6",
                ],
              },
            ],
          },
        });
      }
    </script>
  </body>
</html>
